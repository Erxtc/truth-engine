<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Dashboard — truth-engine</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --elevated: #1c2129;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --accent: #58a6ff; --success: #3fb950; --warning: #d29922; --error: #f85149;
    --purple: #a371f7; --radius: 8px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.5; }
  .app { max-width: 1300px; margin: 0 auto; padding: 20px; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .header-stats { display: flex; gap: 16px; font-size: 13px; color: var(--text2); flex-wrap:wrap; }
  .header-stats strong { color: var(--text); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot.running { background: var(--success); animation: pulse 1.5s infinite; }
  .dot.failed  { background: var(--error); }
  .dot.done    { background: var(--text3); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .active-bar {
    background: linear-gradient(135deg, rgba(63,185,80,.1), rgba(63,185,80,.04));
    border: 1px solid rgba(63,185,80,.25); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px;
  }
  .active-bar.warn { background: linear-gradient(135deg, rgba(210,153,34,.1), rgba(210,153,34,.04)); border-color: rgba(210,153,34,.25); }
  .active-bar.warn .count { color: var(--warning); }
  .active-bar.warn button { border-color: var(--warning); color: var(--warning); }
  .active-bar.warn button:hover { background: var(--warning); color: #000; }
  .active-bar .count { font-size: 28px; font-weight: 800; color: var(--success); min-width: 40px; }
  .active-bar .info { flex: 1; }
  .active-bar .info .title { font-size: 13px; font-weight: 600; }
  .active-bar .info .detail { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .active-bar button {
    padding: 8px 16px; border-radius: 6px; border: 1px solid var(--success);
    background: rgba(63,185,80,.1); color: var(--success); cursor: pointer;
    font-family: var(--font); font-size: 12px; font-weight: 600; transition: all .15s;
  }
  .active-bar button:hover { background: var(--success); color: #000; }

  .grid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

  /* Prompt groups */
  .prompt-groups { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .prompt-group {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .prompt-group-header {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    cursor: pointer; user-select: none; transition: background .1s;
  }
  .prompt-group-header:hover { background: var(--elevated); }
  .prompt-group-header .pg-arrow { font-size: 10px; color: var(--text3); transition: transform .15s; width: 14px; text-align: center; }
  .prompt-group.open .pg-arrow { transform: rotate(90deg); }
  .prompt-group-header .pg-prompt { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prompt-group-header .pg-counts { display: flex; gap: 10px; font-size: 11px; flex-shrink: 0; }
  .pg-counts span { display: flex; align-items: center; gap: 3px; }
  .pg-counts .c-running { color: var(--success); }
  .pg-counts .c-failed { color: var(--error); }
  .pg-counts .c-done { color: var(--text3); }
  .prompt-group-body { display: none; border-top: 1px solid var(--border); }
  .prompt-group.open .prompt-group-body { display: block; }
  .prompt-group-body .agent-card { margin: 0; border: none; border-bottom: 1px solid var(--border); border-radius: 0; }
  .prompt-group-body .agent-card:last-child { border-bottom: none; }

  .section-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .section-title .count { font-size: 11px; color: var(--text3); font-weight: 400; }

  .agent-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px; transition: border-color .15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.running { border-left: 3px solid var(--success); background: rgba(63,185,80,.03); }
  .agent-card.failed  { border-left: 3px solid var(--error); }
  .agent-card.crashed { border-left: 3px solid var(--warning); }
  .agent-card.completed { border-left: 3px solid var(--text3); }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .card-name { font-weight: 600; font-size: 13px; }
  .card-type {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    padding: 2px 8px; border-radius: 12px; letter-spacing: .4px;
  }
  .card-type.develop { background: rgba(88,166,255,.15); color: var(--accent); }
  .card-type.pipeline { background: rgba(163,113,247,.15); color: var(--purple); }
  .card-status {
    font-size: 9px; font-weight: 600; text-transform: uppercase;
    padding: 2px 8px; border-radius: 12px;
  }
  .card-status.running   { background: rgba(63,185,80,.15); color: var(--success); }
  .card-status.completed { background: rgba(139,148,158,.15); color: var(--text2); }
  .card-status.failed    { background: rgba(248,81,73,.15); color: var(--error); }
  .card-status.crashed   { background: rgba(210,153,34,.15); color: var(--warning); }
  .card-meta { font-size: 10px; color: var(--text2); margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; }
  .card-actions { margin-top: 6px; display: flex; gap: 8px; align-items: center; }
  .card-actions button {
    font-size: 10px; padding: 3px 10px; border-radius: 4px; border: 1px solid var(--border);
    background: var(--elevated); color: var(--text2); cursor: pointer; font-family: var(--font);
    transition: all .15s;
  }
  .card-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .card-actions button.resume-btn { border-color: rgba(63,185,80,.4); color: var(--success); }
  .card-actions button.resume-btn:hover { background: var(--success); color: #000; }
  .session-id { font-size: 9px; color: var(--text3); }

  .log-viewer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; margin-top: 6px; display: none; }
  .log-viewer.open { display: block; }
  .log-viewer pre { font-size: 10px; font-family: 'SF Mono', monospace; max-height: 250px; overflow-y: auto; white-space: pre-wrap; color: var(--text2); background: var(--bg); padding: 8px; border-radius: 4px; }

  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text); }
  .prompt-quick { display: block; width: 100%; text-align: left; padding: 7px 10px; background: var(--elevated); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); font-size: 11px; cursor: pointer; font-family: var(--font); margin-bottom: 5px; transition: all .15s; }
  .prompt-quick:hover { border-color: var(--accent); color: var(--text); }
  .prompt-quick .pq-desc { font-size: 9px; color: var(--text3); display: block; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .custom-input { width: 100%; padding: 8px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-family: var(--font); margin-bottom: 8px; resize: vertical; }
  .spawn-btn { width: 100%; padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: opacity .15s; }
  .spawn-btn:hover { opacity: .85; }
  .spawn-btn:disabled { opacity: .4; cursor: not-allowed; }

  .session-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 11px; border-bottom: 1px solid var(--border); }
  .session-item:last-child { border-bottom: none; }
  .session-item .s-icon { font-size: 12px; flex-shrink: 0; }
  .session-item .s-info { flex: 1; min-width: 0; }
  .session-item .s-name { font-weight: 500; color: var(--text); }
  .session-item .s-meta { font-size: 10px; color: var(--text3); }
  .session-item button { font-size: 9px; padding: 3px 10px; border-radius: 4px; background: var(--elevated); border: 1px solid var(--border); color: var(--text2); cursor: pointer; font-family: var(--font); white-space: nowrap; transition: all .15s; }
  .session-item button:hover { border-color: var(--success); color: var(--success); }

  .stat-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 12px; }
  .stat-label { color: var(--text2); }
  .stat-value { font-weight: 600; }
  .stat-value.good { color: var(--success); }
  .refresh-bar { font-size: 10px; color: var(--text3); text-align: center; margin-top: 8px; }
  .empty { text-align: center; padding: 32px; color: var(--text3); font-size: 12px; }
  .empty-sub { font-size: 10px; margin-top: 4px; opacity: .6; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 6px; vertical-align: middle; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div><h1>truth-engine <span>agents</span></h1></div>
    <div class="header-stats" id="headerStats"><span class="spinner"></span> Loading...</div>
  </div>

  <div id="activeBar"></div>

  <!-- Prompt groups: "3 bots running strategize, 2 running execute" -->
  <div class="prompt-groups" id="promptGroups"></div>

  <div class="grid">
    <div>
      <div class="section-title">All Agents <span class="count" id="agentCount"></span></div>
      <div class="agent-list" id="agentList">
        <div class="empty"><span class="spinner"></span> Loading agents…</div>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel">
        <h3>Sessions</h3>
        <div id="sessionList"><div class="empty" style="padding:16px"><span class="spinner"></span> Loading…</div></div>
      </div>

      <div class="panel">
        <h3>Spawn Agent</h3>
        <div id="promptList"></div>
        <textarea class="custom-input" id="customPrompt" placeholder="Or type a custom prompt…" rows="2"></textarea>
        <button class="spawn-btn" id="spawnBtn" onclick="spawnAgent()">Spawn Agent</button>
        <div id="spawnStatus" style="font-size:11px;margin-top:6px;color:var(--text2)"></div>
      </div>

      <div class="panel">
        <h3>Stats</h3>
        <div id="statsPanel"><span class="spinner"></span></div>
        <div class="refresh-bar">Auto-refresh every 3s · <span id="lastRefresh">just now</span></div>
      </div>
    </div>
  </div>
</div>

<script>
var API = '';
var agents = [];
var sessions = [];

function fetchJSON(url) {
  return fetch(url).then(function(r) { return r.json(); }).catch(function() { return null; });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function statusIcon(s) {
  if (s === 'running') return '<span class="dot running"></span>';
  if (s === 'failed' || s === 'crashed') return '<span class="dot failed"></span>';
  return '<span class="dot done"></span>';
}

function timeAgo(iso) {
  var diff = Date.now() - new Date(iso).getTime();
  var sec = Math.floor(diff / 1000);
  if (sec < 60) return sec + 's ago';
  var min = Math.floor(sec / 60);
  if (min < 60) return min + 'm ago';
  var hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h ' + (min % 60) + 'm ago';
  return Math.floor(hr / 24) + 'd ago';
}

// ── Prompt grouping ──────────────────────────────────────────────────

function promptKey(p) {
  if (!p) return '(unknown)';
  // Normalize: lowercase, strip extra whitespace, take first 80 chars
  return p.toLowerCase().replace(/\s+/g, ' ').trim().slice(0, 80);
}

function buildPromptGroups() {
  var groups = {};
  var devAgents = agents.filter(function(a) { return a.type === 'develop'; });

  for (var i = 0; i < devAgents.length; i++) {
    var a = devAgents[i];
    var key = promptKey(a.prompt);
    if (!groups[key]) {
      groups[key] = { prompt: a.prompt || '(unknown)', running: 0, completed: 0, failed: 0, agents: [] };
    }
    groups[key].agents.push(a);
    if (a.status === 'running') groups[key].running++;
    else if (a.status === 'completed') groups[key].completed++;
    else groups[key].failed++;
  }

  // Sort: running first, then by most recent
  var result = Object.values(groups);
  result.sort(function(a, b) {
    if (a.running !== b.running) return b.running - a.running;
    return b.agents.length - a.agents.length;
  });
  return result;
}

function renderPromptGroups() {
  var el = document.getElementById('promptGroups');
  var groups = buildPromptGroups();
  if (groups.length === 0) {
    el.innerHTML = '';
    return;
  }
  var html = '';
  for (var i = 0; i < groups.length; i++) {
    var g = groups[i];
    var total = g.agents.length;
    var counts = [];
    if (g.running > 0) counts.push('<span class="c-running"><span class="dot running"></span>' + g.running + ' running</span>');
    if (g.failed > 0) counts.push('<span class="c-failed"><span class="dot failed"></span>' + g.failed + ' failed</span>');
    if (g.completed > 0) counts.push('<span class="c-done"><span class="dot done"></span>' + g.completed + ' done</span>');
    // Build agent cards for this group
    var agentCards = '';
    for (var j = 0; j < g.agents.length; j++) {
      agentCards += renderAgentCard(g.agents[j]);
    }
    html += '<div class="prompt-group" id="pg-' + i + '">' +
      '<div class="prompt-group-header" onclick="toggleGroup(' + i + ')">' +
        '<span class="pg-arrow">▶</span>' +
        '<span class="pg-prompt" title="' + esc(g.prompt) + '">' + esc(g.prompt.slice(0, 120)) + '</span>' +
        '<span class="pg-counts">' + counts.join('') + ' <span style="color:var(--text3)">(' + total + ' total)</span></span>' +
      '</div>' +
      '<div class="prompt-group-body">' + agentCards + '</div>' +
    '</div>';
  }
  el.innerHTML = html;
}

function toggleGroup(i) {
  var el = document.getElementById('pg-' + i);
  if (el) el.classList.toggle('open');
}

// ── Agent cards ──────────────────────────────────────────────────────

function renderAgentCard(agent) {
  var typeLabel = agent.type === 'develop' ? 'dev' : 'pipe';
  var meta = [];
  if (agent.calls !== null) meta.push(agent.calls + ' calls');
  if (agent.tokens !== null) meta.push((agent.tokens/1000).toFixed(1) + 'k tokens');
  if (agent.durationSec !== null) meta.push(agent.durationSec + 's');
  meta.push(timeAgo(agent.startedAt));

  var h = '<div class="agent-card ' + agent.status + '">' +
    '<div class="card-top">' +
      '<span class="card-name">' + statusIcon(agent.status) + ' ' + esc(agent.name) + '</span>' +
      '<div style="display:flex;gap:4px;align-items:center">' +
        '<span class="card-type ' + agent.type + '">' + typeLabel + '</span>' +
        '<span class="card-status ' + agent.status + '">' + agent.status + '</span>' +
      '</div>' +
    '</div>';
  if (agent.prompt) h += '<div class="card-prompt" title="' + esc(agent.prompt) + '" style="font-size:10px;color:var(--text3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px">' + esc(agent.prompt.slice(0, 150)) + '</div>';
  h += '<div class="card-meta">' + meta.join(' · ') + '</div>' +
    '<div class="card-actions">' +
      '<button onclick="toggleLog(\'' + agent.id + '\',\'' + esc(agent.logFile) + '\')">Log</button>';
  if (agent.sessionId) h += '<span class="session-id">sid:' + agent.sessionId.slice(0,8) + '</span>';
  h += '</div>' +
    '<div class="log-viewer" id="log-' + agent.id + '"><pre id="log-content-' + agent.id + '">Loading...</pre></div>' +
    '</div>';
  return h;
}

function renderAgentList() {
  var el = document.getElementById('agentList');
  var devAgents = agents.filter(function(a) { return a.type === 'develop'; });
  if (devAgents.length === 0) {
    el.innerHTML = '<div class="empty">No dev agents yet<div class="empty-sub">Spawn one from the sidebar →</div></div>';
  } else {
    var html = '';
    for (var i = 0; i < devAgents.length; i++) {
      html += renderAgentCard(devAgents[i]);
    }
    el.innerHTML = html;
  }
  document.getElementById('agentCount').textContent = '(' + devAgents.length + ')';
}

// ── Active bar ───────────────────────────────────────────────────────

function renderActiveBar() {
  var running = agents.filter(function(a) { return a.status === 'running'; });
  var crashed = agents.filter(function(a) { return a.status === 'crashed'; });
  var el = document.getElementById('activeBar');
  if (running.length === 0 && crashed.length === 0) { el.innerHTML = ''; return; }
  var devRunning = agents.filter(function(a) { return a.status === 'running' && a.type === 'develop'; }).length;
  var hasWarn = crashed.length > 0;
  el.innerHTML = '<div class="active-bar' + (hasWarn ? ' warn' : '') + '">' +
    '<div class="count">' + devRunning + '</div>' +
    '<div class="info">' +
      '<div class="title">Dev Agent' + (devRunning !== 1 ? 's' : '') + ' Active</div>' +
      '<div class="detail">' + running.length + ' total running · ' + crashed.length + ' crashed' + (crashed.length > 0 ? ' — recover below' : '') + '</div>' +
    '</div>' +
    (crashed.length > 0 ? '<button onclick="resumeSession(1)">Resume</button>' : '') +
    '</div>';
}

// ── Sessions ─────────────────────────────────────────────────────────

function renderSessions() {
  var el = document.getElementById('sessionList');
  if (sessions.length === 0) {
    el.innerHTML = '<div class="empty" style="padding:16px">No sessions yet<div class="empty-sub">Run agents to see them here</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < Math.min(sessions.length, 10); i++) {
    var s = sessions[i];
    var icon = s.status === 'crashed' ? '💥' : s.status === 'completed' ? '✓' : '●';
    var ago = Math.floor((Date.now()/1000 - s.startedAt) / 60);
    var agoStr = ago < 1 ? 'just now' : ago < 60 ? ago + 'm' : Math.floor(ago/60) + 'h';
    var canResume = s.status === 'crashed';
    html += '<div class="session-item">' +
      '<span class="s-icon">' + icon + '</span>' +
      '<div class="s-info"><div class="s-name">' + esc(s.slug) + '</div><div class="s-meta">' + agoStr + ' ago</div></div>' +
      (canResume ? '<button onclick="resumeSession(' + (i+1) + ')">Resume</button>' : '') +
      '</div>';
  }
  el.innerHTML = html;
}

// ── Sidebar ──────────────────────────────────────────────────────────

function renderPromptButtons(prompts) {
  var el = document.getElementById('promptList');
  if (!prompts) { el.innerHTML = '<div class="empty" style="padding:10px;font-size:11px">No prompts loaded</div>'; return; }
  var keys = Object.keys(prompts);
  var html = '';
  for (var i = 0; i < Math.min(keys.length, 8); i++) {
    var k = keys[i];
    html += '<button class="prompt-quick" onclick="spawnNamed(\'' + esc(k) + '\')">' +
      '<strong>' + esc(k) + '</strong>' +
      '<span class="pq-desc">' + esc(prompts[k].slice(0, 80)) + '</span>' +
      '</button>';
  }
  el.innerHTML = html;
}

function renderStats() {
  var running = agents.filter(function(a) { return a.status === 'running'; }).length;
  var completed = agents.filter(function(a) { return a.status === 'completed'; }).length;
  var failed = agents.filter(function(a) { return a.status === 'failed' || a.status === 'crashed'; }).length;
  var dev = agents.filter(function(a) { return a.type === 'develop'; }).length;
  var pipe = agents.filter(function(a) { return a.type === 'pipeline'; }).length;
  // Count unique prompts
  var prompts = {};
  for (var i = 0; i < agents.length; i++) {
    if (agents[i].type === 'develop' && agents[i].prompt) {
      prompts[promptKey(agents[i].prompt)] = true;
    }
  }
  var uniquePrompts = Object.keys(prompts).length;

  document.getElementById('headerStats').innerHTML =
    '<span><span class="dot running"></span> <strong>' + running + '</strong> running</span>' +
    '<span><span class="dot failed"></span> <strong>' + failed + '</strong> failed</span>' +
    '<span><span class="dot done"></span> <strong>' + completed + '</strong> done</span>';

  document.getElementById('statsPanel').innerHTML =
    '<div class="stat-row"><span class="stat-label">Dev agents</span><span class="stat-value">' + dev + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Unique prompts</span><span class="stat-value">' + uniquePrompts + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Running</span><span class="stat-value good">' + running + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Completed</span><span class="stat-value">' + completed + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Failed/Crashed</span><span class="stat-value" style="color:var(--error)">' + failed + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Pipeline runs</span><span class="stat-value">' + pipe + '</span></div>';

  document.getElementById('lastRefresh').textContent = 'just now';
}

// ── Main render ──────────────────────────────────────────────────────

function render() {
  renderStats();
  renderActiveBar();
  renderPromptGroups();
  renderAgentList();
  renderSessions();
}

// ── Data loading ─────────────────────────────────────────────────────

async function loadAll() {
  try {
    var results = await Promise.all([
      fetchJSON(API + '/api/agents'),
      fetchJSON(API + '/api/sessions'),
      fetchJSON(API + '/api/prompts'),
    ]);
    agents = results[0] || [];
    sessions = results[1] || [];
    render();
    if (results[2]) renderPromptButtons(results[2]);
  } catch(e) { console.error(e); }
}

// ── Actions ──────────────────────────────────────────────────────────

function spawnNamed(name) {
  document.getElementById('customPrompt').value = name;
  spawnAgent();
}

async function resumeSession(idx) {
  var el = document.getElementById('spawnStatus');
  el.innerHTML = '<span class="spinner"></span> Resuming...';
  try {
    var r = await fetch(API + '/api/resume', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ index: String(idx) }),
    });
    var data = await r.json();
    if (data.ok) { el.textContent = '✓ ' + data.msg; setTimeout(loadAll, 2000); }
    else { el.textContent = '✗ ' + data.msg; }
  } catch(e) { el.textContent = '✗ ' + e.message; }
}

async function spawnAgent() {
  var text = document.getElementById('customPrompt').value.trim();
  if (!text) return;
  var btn = document.getElementById('spawnBtn');
  var el = document.getElementById('spawnStatus');
  btn.disabled = true; btn.textContent = 'Spawning...'; el.innerHTML = '<span class="spinner"></span>';
  try {
    var r = await fetch(API + '/api/spawn', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ prompt: text, bg: true }),
    });
    var data = await r.json();
    if (data.ok) {
      el.textContent = '✓ Agent spawned';
      document.getElementById('customPrompt').value = '';
      setTimeout(loadAll, 2000);
    } else { el.textContent = '✗ ' + data.msg; }
  } catch(e) { el.textContent = '✗ ' + e.message; }
  btn.disabled = false; btn.textContent = 'Spawn Agent';
}

async function toggleLog(id, logPath) {
  var viewer = document.getElementById('log-' + id);
  var content = document.getElementById('log-content-' + id);
  if (viewer.classList.contains('open')) { viewer.classList.remove('open'); return; }
  viewer.classList.add('open');
  content.textContent = 'Loading...';
  try {
    var r = await fetch(API + '/api/agent-log?path=' + encodeURIComponent(logPath) + '&lines=60');
    content.textContent = await r.text();
  } catch(e) { content.textContent = 'Failed to load log'; }
}

// ── Init ─────────────────────────────────────────────────────────────

loadAll();
setInterval(loadAll, 3000);

document.getElementById('customPrompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); spawnAgent(); }
});
</script>
